<!DOCTYPE html>
<html>
<head>
    <title>Apply Drive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(135deg, #eef2ff, #f8fafc);">

<nav class="navbar navbar-light bg-white shadow-sm mb-4">
    <div class="container d-flex justify-content-between">
        <span class="fw-bold">Placement Portal</span>

        <div>
            <a href="/student" class="btn btn-outline-dark btn-sm me-2">Dashboard</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">

<h3 class="mb-4">Apply for {{ drive.job_title }}</h3>

<div class="card p-4 shadow-sm">

    <p><strong>Description:</strong> {{ drive.job_description }}</p>
    <p><strong>Eligibility:</strong> {{ drive.eligibility }}</p>

    <a href="/apply/{{ drive.id }}" class="btn btn-success">Confirm Apply</a>

</div>

</div>

</body>
</html>
