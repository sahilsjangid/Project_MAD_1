<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(135deg, #eef2ff, #f8fafc);">

<nav class="navbar navbar-light bg-white shadow-sm mb-4">
    <div class="container d-flex justify-content-between">
        <span class="fw-bold">Placement Portal</span>

        <div>
            <a href="/student" class="btn btn-outline-dark btn-sm me-2">Dashboard</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">

<h2 class="fw-bold mb-4">Edit Profile</h2>

<form method="POST" class="card p-4 shadow-sm">

    <input name="name" class="form-control mb-3" placeholder="Name" value="{{ user.name }}">
    <input name="email" class="form-control mb-3" placeholder="Email" value="{{ user.email }}">

    <button class="btn btn-primary">Update</button>

</form>

</div>

</body>
</html>
