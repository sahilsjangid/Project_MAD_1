<!DOCTYPE html>
<html>
<head>
    <title>Company Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body style="background: linear-gradient(135deg, #eef2ff, #f8fafc);">

<nav class="navbar navbar-light bg-white shadow-sm mb-4">

    </div>
</nav>

<div class="container mt-5">

<h2 class="fw-bold mb-4">Company Dashboard</h2>

<div class="row g-4">

    <div class="col-md-4">

            <h5>Create Drive</h5>
        </a>
    </div>

    <div class="col-md-4">
        <a href="/company/drives" class="card p-4 text-center shadow-sm text-decoration-none">
            <h5>My Drives</h5>
        </a>
    </div>

    <div class="col-md-4">
        <a href="/company/drives" class="card p-4 text-center shadow-sm text-decoration-none">
            <h5>View Applications</h5>
        </a>

    <div class="col-md-4">
        <a href="/company/profile" class="card p-4 text-center shadow-sm text-decoration-none">
