<!DOCTYPE html>
<html>
<head>
    <title>Create Drive</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">Placement Portal</a>

        <div class="ms-auto d-flex align-items-center">

            {% if "user_id" in session %}

                {% if session["role"] == "student" %}
                    <div class="d-flex align-items-center">
                        <a href="/student" class="nav-link me-3">Dashboard</a>
                        <a href="/my_applications" class="nav-link me-3">My Applications</a>

                    </div>

                {% elif session["role"] == "company" %}
                    <a href="/company" class="nav-link">Dashboard</a>

                {% elif session["role"] == "admin" %}
                    <a href="/admin" class="nav-link">Admin Panel</a>
                {% endif %}

                <a href="/logout" class="btn btn-danger btn-sm ms-3">Logout</a>

            {% else %}


                <a href="/" class="nav-link">Login</a>
                <a href="/register" class="nav-link">Register</a>

            {% endif %}

        </div>

    </div>
</nav>

<div class="container mt-5">

<h2 class="fw-bold mb-4">Create Drive</h2>

<form method="POST" class="card p-4 shadow-sm">
    <input name="title" class="form-control mb-3" placeholder="Job Title">
    <textarea name="description" class="form-control mb-3" placeholder="Description"></textarea>
    <input name="eligibility" class="form-control mb-3" placeholder="Eligibility">
    <input name="deadline" class="form-control mb-3" placeholder="Deadline">
    <button class="btn btn-success">Create</button>
</form>

</div>

</body>
</html>
