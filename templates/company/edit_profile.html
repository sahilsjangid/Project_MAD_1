<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body style="background: linear-gradient(135deg, #eef2ff, #f8fafc);">

<nav class="navbar navbar-light bg-white shadow-sm mb-4">
    <div class="container d-flex justify-content-between">
        <span class="fw-bold">Placement Portal</span>
        <div>
            <a href="/company" class="btn btn-outline-dark btn-sm me-2">Dashboard</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container">

<h2 class="fw-bold mb-4">Edit Company Profile</h2>

<form method="POST" class="card p-4 shadow-sm">

    <input name="company_name" class="form-control mb-3"
           value="{{ company.company_name }}" placeholder="Company Name">

    <input name="hr_contact" class="form-control mb-3"
           value="{{ company.hr_contact }}" placeholder="HR Contact">

    <input name="website" class="form-control mb-3"
           value="{{ company.website }}" placeholder="Website">

    <button class="btn btn-primary">Update Profile</button>

</form>

</div>

</body>
</html>
