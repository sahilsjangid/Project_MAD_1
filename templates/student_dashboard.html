<head>
    <title>Student Dashboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap (VERY IMPORTANT) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>


<div class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">

    <div class="d-flex align-items-center">
        <div class="avatar-circle me-3"
             style="background-color: hsl({{ (user.id * 57) % 360 }}, 70%, 50%)">
            {{ user.name[0] | upper }}
        </div>

        <h5 class="fw-bold mb-0">Welcome, {{ user.name }}</h5>
    </div>

    <div>
        <a href="/my_applications" class="btn btn-primary btn-sm me-2">My Applications</a>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>

</div>

<hr class="mb-4">

<h4 class="fw-semibold mb-4">Available Drives</h4>

<div class="row">
    {% for drive in drives %}
    <div class="col-md-4">
        <div class="card p-3 shadow-sm mb-4">
            <h5>{{ drive.job_title }}</h5>
            <p>{{ drive.job_description }}</p>
            <a href="/apply/{{ drive.id }}" class="btn btn-success btn-sm">Apply</a>
        </div>
    </div>
    {% endfor %}
</div>

</div>
