<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 text-center" style="width:380px;">

        <h3 class="fw-bold mb-3">Create Account</h3>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <input name="name" class="form-control mb-3" placeholder="Name">
            <input name="email" class="form-control mb-3" placeholder="Email">
            <input name="password" type="password" class="form-control mb-3" placeholder="Password">

            <select name="role" class="form-select mb-3">
                <option value="student">Student</option>
                <option value="company">Company</option>
            </select>

            <button class="btn btn-success w-100">Register</button>
        </form>

        <a href="/" class="mt-3 d-block">← Back to Login</a>

    </div>
</div>

</body>
</html>
